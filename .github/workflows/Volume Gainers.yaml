# ── 3. Install dependencies ────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: pip install yfinance pandas pytz requests

      # ── 4. Market-hours gate ───────────────────────────────────────────────
      - name: 🕐 Show current IST time
        run: |
          python - <<'EOF'
          from datetime import datetime
          import pytz
          ist = pytz.timezone("Asia/Kolkata")
          print("Current IST time:", datetime.now(ist).strftime("%Y-%m-%d %H:%M:%S %Z"))
          EOF

      # ── 5. Run the volume-gainers scanner ─────────────────────────────────
      - name: 📈 Run Volume Gainers scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python volume_gainers.py