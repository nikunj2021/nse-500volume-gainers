<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live NSE Volume Gainers</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --muted: #8b949e;
      --text: #e6edf3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .title-group h1 { font-size: 1.4rem; font-weight: 700; }
    .title-group p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    
    .controls { display: flex; align-items: center; gap: 16px; }
    .status-dot {
      height: 10px; width: 10px; background-color: var(--green);
      border-radius: 50%; display: inline-block;
      box-shadow: 0 0 8px var(--green);
    }
    .status-text { font-size: 0.85rem; color: var(--muted); }
    button.refresh-btn {
      background: var(--border); color: var(--text);
      border: none; padding: 8px 16px; border-radius: 6px;
      cursor: pointer; font-weight: 600; font-size: 0.85rem;
      transition: background 0.2s;
    }
    button.refresh-btn:hover { background: #444c56; }

    main { padding: 32px; max-width: 1000px; margin: 0 auto; }
    
    .table-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; text-align: right; }
    th {
      background: #1c2128; color: var(--muted);
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: .05em;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-weight: 600; white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    td {
      padding: 12px 16px; font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    tr:hover td { background: #1c2128; }
    tr:last-child td { border-bottom: none; }

    .symbol { font-weight: 600; color: var(--accent); }
    .badge {
      display: inline-block; color: #fff; padding: 3px 9px;
      border-radius: 4px; font-weight: 600; font-size: 0.82rem;
      min-width: 62px; text-align: center;
    }
    
    #loader { text-align: center; padding: 40px; color: var(--muted); }
    .hidden { display: none; }
  </style>
</head>
<body>

<header>
  <div class="title-group">
    <h1>📈 NSE 500 — Volume Gainers</h1>
    <p id="last-updated">Last fetched: --</p>
  </div>
  <div class="controls">
    <div style="display: flex; align-items: center; gap: 8px;">
      <span class="status-dot" id="live-indicator"></span>
      <span class="status-text" id="status-label">Auto-refresh Active (5m)</span>
    </div>
    <button class="refresh-btn" onclick="fetchData()">Force Refresh</button>
  </div>
</header>

<main>
  <div class="table-container">
    <table id="data-table">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Current Price (₹)</th>
          <th>Change %</th>
          <th>Volume (M)</th>
          <th>10D SMA Vol (M)</th>
        </tr>
      </thead>
      <tbody id="table-body">
      </tbody>
    </table>
    <div id="loader">Fetching latest market data...</div>
  </div>
</main>

<script>
  // Pointing precisely to the static file overwritten by your Python script
  const CSV_URL = 'reports/Volume_Gainers_Latest.csv'; 
  const REFRESH_INTERVAL_MS = 5 * 60 * 1000;

  const formatMillions = (numStr) => {
    const num = parseFloat(numStr);
    if (isNaN(num)) return '-';
    return (num / 1000000).toFixed(2) + ' M';
  };

  const getGainColor = (pct) => {
    if (pct >= 5) return "#1a7a3c";
    if (pct >= 3) return "#27ae60";
    if (pct >= 1) return "#82c99f";
    if (pct > 0) return "#c8ecd5";
    return "transparent";
  };

  const parseCSV = (str) => {
    const lines = str.trim().split('\n');
    if (lines.length === 0) return [];
    const headers = lines[0].split(',').map(h => h.trim());
    return lines.slice(1).map(line => {
      const values = line.split(',');
      let obj = {};
      headers.forEach((header, i) => {
        obj[header] = values[i] ? values[i].trim() : '';
      });
      return obj;
    });
  };

  const fetchData = async () => {
    const tbody = document.getElementById('table-body');
    const loader = document.getElementById('loader');
    const lastUpdated = document.getElementById('last-updated');

    loader.classList.remove('hidden');
    tbody.innerHTML = '';

    try {
      const response = await fetch(`${CSV_URL}?t=${new Date().getTime()}`);
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      
      const csvText = await response.text();
      const data = parseCSV(csvText);

      if (data.length > 0 && data[0].Message) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 20px; color: var(--muted);">${data[0].Message}</td></tr>`;
      } else {
        renderTable(data);
      }

      const now = new Date();
      lastUpdated.innerText = `Last fetched: ${now.toLocaleTimeString()}`;

    } catch (error) {
      console.error('Error fetching data:', error);
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: var(--red);">Error loading data. Ensure the Python script has run and saved to 'reports/Volume_Gainers_Latest.csv'.</td></tr>`;
    } finally {
      loader.classList.add('hidden');
    }
  };

  const renderTable = (data) => {
    const tbody = document.getElementById('table-body');
    
    data.forEach(row => {
      if (!row['Ticker Name']) return; 

      const gain = parseFloat(row['Gain %']);
      const gainColor = getGainColor(gain);
      const gainPrefix = gain > 0 ? '+' : '';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="symbol">${row['Ticker Name']}</td>
        <td>₹ ${parseFloat(row['Current Price']).toFixed(2)}</td>
        <td><span class="badge" style="background:${gainColor}; color: ${gain > 1 ? '#fff' : '#000'}">${gainPrefix}${gain.toFixed(2)}%</span></td>
        <td>${formatMillions(row['Volume'])}</td>
        <td>${formatMillions(row['10 Days Avg Volume'])}</td>
      `;
      tbody.appendChild(tr);
    });
  };

  fetchData();
  setInterval(fetchData, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
